# .github/workflows/build-codingpad.yml
# Builds CodingPad IPA (iSH-ARM64 + CodingPad Agent Core) for TrollStore
name: Build CodingPad IPA

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

env:
  SCHEME: iSH-ARM64
  CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}

jobs:
  build:
    name: Build CodingPad IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install dependencies
        run: |
          brew install ninja meson ldid coreutils lld llvm
          gem install xcodeproj
          echo "Xcode version:"
          xcodebuild -version

      - name: Inject CodingPad Swift files into Xcode project
        run: |
          ruby scripts/inject_codingpad.rb

      - name: Build iSH-ARM64 (includes CodingPad)
        run: |
          xcodebuild \
            -project iSH.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            build \
            SYMROOT="$PWD/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            EXPANDED_CODE_SIGN_IDENTITY=''

      - name: Package TrollStore IPA
        run: |
          # Package main app directly (skip FileProvider extension for now)
          APP_DIR="build/$CONFIGURATION-iphoneos"
          APP_NAME=$(ls "$APP_DIR" | grep '\.app$' | head -1)

          echo "App found: $APP_DIR/$APP_NAME"

          mkdir -p build/Payload
          cp -r "$APP_DIR/$APP_NAME" build/Payload/

          # Sign with ldid for TrollStore
          BINARY_NAME="${APP_NAME%.app}"
          if [ -f "app/iSH-ARM64-ad-hoc.entitlements" ]; then
            ldid -S"app/iSH-ARM64-ad-hoc.entitlements" "build/Payload/$APP_NAME/$BINARY_NAME"
          fi

          # Create .tipa
          cd build
          zip -qry CodingPad-TrollStore.tipa Payload/

          echo "=== IPA Info ==="
          ls -lh CodingPad-TrollStore.tipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CodingPad-IPA
          path: |
            build/*.tipa
            build/*.ipa
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.tipa
            build/*.ipa
          generate_release_notes: true
